# SSA-TFT 全增强配置（多尺度SSA + 短过渡检测 + 安全检查点）
MODEL_TYPE: "tft"
TFT_UNITS: 32
TFT_HIDDEN_DIM: 64
TFT_NUM_HEADS: 4
TFT_DROPOUT: 0.1
TFT_LSTM_LAYERS: 1
TFT_QUANTILES: [0.1, 0.5, 0.9]
TFT_STATIC_FEATURES: 0
WINDOW_SIZE: 12
SSA_WINDOW_SIZES: [6, 12, 24]
N_STEPS: 12
EPOCHS: 50
FULL_EPOCHS: 10000
BATCH_SIZE: 32
INIT_TRAIN_SIZE: 200
THRESHOLD_METHOD: "dynamic"
DYNAMIC_THRESHOLD: true
CALIBRATION_SIZE: 100
THRESHOLD_MULTIPLIER: 2.5
CONSECUTIVE_COUNT: 3
SEED: 11
ENABLE_MULTI_SCALE_SSA: true
ENABLE_BIDIRECTIONAL_CONFIRM: true
ENABLE_CHANGE_POINT_PREFILTER: false
ENABLE_SAFE_CHECKPOINT: true
CONTAMINATION_WINDOW: 10
CLEAR_SESSION_ON_TRANSITION: true
