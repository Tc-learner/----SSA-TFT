# 短过渡检测配置 —— 启用全套短过渡 / 非稳态检测功能
MODEL_TYPE: "lstm"
LSTM_UNITS: 50
WINDOW_SIZE: 12
N_STEPS: 12
EPOCHS: 50
INIT_TRAIN_SIZE: 200
BATCH_SIZE: 32
CONSECUTIVE_COUNT: 3
SEED: 11

# 自适应阈值：CUSUM 对小而持续的漂移更敏感
THRESHOLD_METHOD: "cusum"
DYNAMIC_THRESHOLD: true
CALIBRATION_SIZE: 100
THRESHOLD_MULTIPLIER: 2.0
CUSUM_DRIFT: 0.05

# 短过渡检测核心功能
ENABLE_MULTI_SCALE_SSA: true
SSA_WINDOW_SIZES: [6, 12, 24]
ENABLE_BIDIRECTIONAL_CONFIRM: true

# 安全检查点：防止模型污染
ENABLE_SAFE_CHECKPOINT: true
CONTAMINATION_WINDOW: 10
CLEAR_SESSION_ON_TRANSITION: true

# 短片段回退
MIN_SEGMENT_LENGTH: 3
ENABLE_STATISTICAL_FALLBACK: true

# 变化点预筛选（需要 ruptures 库）
ENABLE_CHANGE_POINT_PREFILTER: false
