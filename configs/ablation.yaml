# SSA-TFT 消融实验配置模板
# 用法：手动修改 MODEL_TYPE 和相关开关进行消融实验
#
# 消融组合:
#   完整 TFT:                    MODEL_TYPE=tft, 所有组件启用
#   去掉 Variable Selection:     (需代码中设置 vsn_enabled=False)
#   去掉 Self-Attention:         (需代码中设置 attention_enabled=False)
#   去掉 GRN:                    (需代码中设置 grn_enabled=False)
#   只用 LSTM (基线):            MODEL_TYPE=lstm
#   只用 SSA (无预测模型):       (需单独脚本)

MODEL_TYPE: "tft"
TFT_UNITS: 32
TFT_HIDDEN_DIM: 64
TFT_NUM_HEADS: 4
TFT_DROPOUT: 0.1
TFT_LSTM_LAYERS: 1
TFT_QUANTILES: [0.1, 0.5, 0.9]
TFT_STATIC_FEATURES: 0
WINDOW_SIZE: 12
N_STEPS: 12
EPOCHS: 50
FULL_EPOCHS: 10000
BATCH_SIZE: 32
INIT_TRAIN_SIZE: 200
THRESHOLD_METHOD: "dynamic"
DYNAMIC_THRESHOLD: true
CALIBRATION_SIZE: 100
THRESHOLD_MULTIPLIER: 2.5
CONSECUTIVE_COUNT: 3
SEED: 11
ENABLE_MULTI_SCALE_SSA: false
ENABLE_BIDIRECTIONAL_CONFIRM: false
ENABLE_CHANGE_POINT_PREFILTER: false
ENABLE_SAFE_CHECKPOINT: false
